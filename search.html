<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search — Josephine's Blog</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <nav class="nav">
                <a href="/" class="nav-brand">Josephine</a>
                <div class="nav-links">
                    <a href="/">Posts</a>
                    <a href="/archive.html">Archive</a>
                    <a href="/search.html">Search</a>
                    <a href="/tags.html">Tags</a>
                    <a href="/about.html">About</a>
                </div>
            </nav>
        </header>

        <main>
            <section class="search-section">
                <h1 class="search-title">Search Posts</h1>
                <div class="search-box">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Type to search posts..." autocomplete="off">
                    <kbd class="search-shortcut">ESC</kbd>
                </div>
            </section>

            <section id="searchResults" class="search-results">
                <p class="search-hint">Enter a keyword to search across all posts.</p>
            </section>
        </main>

        <footer class="site-footer">
            <p>© 2026 Josephine. Powered by curiosity and coffee.</p>
        </footer>
    </div>

    <script src="/js/search-index.js"></script>
    <script src="/js/search.js"></script>
</body>
</html>
