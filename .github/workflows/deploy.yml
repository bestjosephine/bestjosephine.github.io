name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node build.js
      - name: Prepare deploy folder
        run: |
          mkdir -p _site/css _site/js _site/posts
          cp index.html archive.html about.html search.html tags.html _site/
          cp css/style.css _site/css/
          cp js/search.js js/search-index.js _site/js/
          cp -r posts/*/index.html _site/posts/ 2>/dev/null || true
          # Copy each post directory (with its index.html)
          for dir in posts/*/; do
            if [ -f "$dir/index.html" ]; then
              slug=$(basename "$dir")
              mkdir -p "_site/posts/$slug"
              cp "$dir/index.html" "_site/posts/$slug/"
            fi
          done
          touch _site/.nojekyll
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean-exclude: |
            .nojekyll
            CNAME
