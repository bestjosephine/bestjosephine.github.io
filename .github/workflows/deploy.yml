name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node build.js
      - name: Prepare site
        run: |
          mkdir -p _site/css _site/js
          cp index.html archive.html about.html search.html tags.html _site/
          cp css/style.css _site/css/
          cp js/search.js js/search-index.js _site/js/
          for dir in posts/*/; do
            if [ -f "$dir/index.html" ]; then
              slug=$(basename "$dir")
              mkdir -p "_site/posts/$slug"
              cp "$dir/index.html" "_site/posts/$slug/"
            fi
          done
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
